<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>QUnit test results</title>
    <link
      rel="stylesheet"
      href="https://code.jquery.com/qunit/qunit-2.24.1.css"
    />
    <style>
      .initialise #qunit-testresult {
        display: none;
      }
      .initialise #qunit-tests {
        display: none;
      }
      #initialise-feedback {
        max-width: 600px;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="qunit"></div>
    <!-- Livereload script injection -->
    <script>
      document.write(
        '<script src="http://' +
          (location.host || 'localhost').split(':')[0] +
          ':35729/livereload.js?snipver=1"></' +
          'script>',
      );
    </script>
    <script src="qunit-funcs.js"></script>
    <script src="render-test-results.js"></script>
  </body>
</html>
